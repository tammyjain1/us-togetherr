<!DOCTYPE html>
<html lang="en">
<head>

<!-- FLOATING HEARTS -->
<div class="hearts"></div>

<div id="welcome-page" class="center glass">

        <img src="images/us28.jpeg">

    <div class="section glass" onclick="toggleContent('you-content')">
        <img src="images/you.jpeg">
        <h2>Only You 💖</h2>
    </div>

    <div id="you-content" class="content hidden glass">

        <!-- 4 IMAGES (.jpeg) -->
        <img src="images/you1.jpeg">
        <img src="images/you2.jpeg">
        <img src="images/you3.jpeg">
        <img src="images/you4.jpeg">

    <div class="final-message glass">
        <h2>It’s always you ❤️</h2>
    </div>
